<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockStock - 내 대시보드</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo">📈 MockStock</div>
        <div class="user-info">
            <span id="userNickname">로딩중...</span>님 환영합니다!
            <button onclick="logout()" class="logout-btn">로그아웃</button>
        </div>
    </nav>

    <div class="container">
        <!-- 상단: 내 지갑 정보 -->
        <div class="glass-panel wallet-panel">
            <h2>내 가상 지갑 💰</h2>
            <div class="balance" id="walletBalance">0 원</div>
        </div>

        <div class="grid-container">
            <!-- 좌측: 현재 주식 시장 (실시간) -->
            <div class="glass-panel stock-market">
                <h2>실시간 주식 시장 📊</h2>
                <div class="stock-list" id="stockList">
                    <!-- JS로 주식 목록 렌더링 -->
                </div>
            </div>

            <!-- 우측: 내 보유 주식 -->
            <div class="glass-panel my-holdings">
                <h2>내 보유 주식 💼</h2>
                <div class="holdings-list" id="holdingsList">
                    <!-- JS로 보유 주식 렌더링 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 매수/매도 모달 -->
    <div id="tradeModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">주식 거래</h2>
            <p id="modalPrice">현재가: 0원</p>
            <div class="input-group">
                <label>수량</label>
                <input type="number" id="tradeQuantity" min="1" value="1">
            </div>
            <div class="trade-buttons">
                <button class="primary-btn buy-btn" onclick="executeTrade('buy')">매수 (Buy)</button>
                <button class="primary-btn sell-btn" onclick="executeTrade('sell')">매도 (Sell)</button>
            </div>
            <div id="modalMessage" class="message-box"></div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
