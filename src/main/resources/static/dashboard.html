<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockStock - Binance Style</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- TradingView Lightweight Charts v4.2.0 강제 고정 (v5 버그 해결) -->
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MockStock<span style="color: #fcd535;">Crypto</span></div>
        <div class="user-info">
            <span id="userNickname">로딩중...</span>
            <button onclick="logout()" class="logout-btn">Log Out</button>
        </div>
    </nav>

    <div class="main-container">
        <!-- 좌측: 마켓 리스트 -->
        <aside class="left-panel">
            <div class="panel-header">Markets</div>
            <div class="market-list" id="stockList">
                <!-- JS로 렌더링 -->
            </div>
        </aside>

        <!-- 중앙: 차트 -->
        <main class="center-panel">
            <div class="chart-header">
                <div id="chartTitle" class="chart-symbol">BTC/KRW</div>
                <div id="chartPrice" class="chart-price">0</div>
            </div>
            <div id="tvchart" class="chart-container"></div>
        </main>

        <!-- 우측: 지갑 & 주문 -->
        <aside class="right-panel">
            <div class="wallet-section">
                <div class="panel-header">My Wallet</div>
                <div class="balance" id="walletBalance">0 KRW</div>
            </div>

            <div class="order-section">
                <div class="panel-header">Order Form</div>
                <div class="order-tabs">
                    <button class="order-tab active" id="tabBuy" onclick="switchOrderTab('buy')">Buy</button>
                    <button class="order-tab" id="tabSell" onclick="switchOrderTab('sell')">Sell</button>
                </div>
                <div class="order-form">
                    <div class="input-row">
                        <label>Price</label>
                        <input type="text" id="orderPrice" disabled value="Market Price">
                    </div>
                    <div class="input-row">
                        <label>Amount</label>
                        <input type="number" id="tradeQuantity" min="1" value="1">
                    </div>
                    <button id="executeBtn" class="execute-btn buy-btn" onclick="executeTrade()">Buy <span id="orderTargetCoin">BTC</span></button>
                    <div id="orderMessage" class="message-box"></div>
                </div>
            </div>

            <div class="holdings-section">
                <div class="panel-header">My Assets</div>
                <div class="holdings-list" id="holdingsList">
                    <!-- JS로 렌더링 -->
                </div>
            </div>
        </aside>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
